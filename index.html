<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // MSAL runs silent token renewal in a hidden iframe pointed at this app's
      // redirect URI (the SPA root). Rendering the full app there is wasteful and the
      // in-app router can navigate the iframe off the auth-response hash that the
      // parent MSAL polls for — breaking renewal. Detect that case BEFORE the React
      // bundle runs, flag it, and window.stop() so main.jsx skips bootstrapping.
      (function () {
        try {
          var inIframe = window.parent && window.parent !== window;
          var hasAuth = /[?#].*(code=|error=|state=)/.test(window.location.href);
          if (inIframe && hasAuth) {
            window.__MSAL_RENEWAL_FRAME__ = true;
            document.title = "Signing you in…";
            try { window.stop(); } catch (_) {}
          }
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // iOS standalone PWA first-paint viewport fix. On a freshly-launched
      // home-screen PWA, WebKit miscomputes `100dvh` on the first paint (the
      // full-screen + safe-area geometry settles a beat late under
      // black-translucent + viewport-fit=cover), leaving a gap at the bottom
      // until the first manual scroll/resize forces a reflow. We mirror the
      // real height into `--app-height` and re-measure on every viewport event
      // + after load, so the layout (h-[var(--app-height,100dvh)]) is always
      // exactly the visible height — no gap, no manual scroll needed.
      // innerHeight (not visualViewport.height) is intentional: it stays the
      // full screen when the keyboard opens, matching the prior dvh behavior.
      (function () {
        function setAppHeight() {
          document.documentElement.style.setProperty("--app-height", window.innerHeight + "px");
        }
        setAppHeight();
        window.addEventListener("resize", setAppHeight);
        window.addEventListener("orientationchange", setAppHeight);
        window.addEventListener("pageshow", setAppHeight);
        if (window.visualViewport) window.visualViewport.addEventListener("resize", setAppHeight);
        window.addEventListener("load", function () {
          requestAnimationFrame(setAppHeight);
          setTimeout(setAppHeight, 300);
        });
      })();
    </script>
    <meta name="description" content="TYRO AI - Tiryaki Agro / TTECH'in kurumsal AI platformu. Agentlar, AI ürünleri ve iş uygulamalarına tek bir yerden erişim." />
    <meta name="theme-color" content="#dd2a7b" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1628" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TYRO AI" />
    <meta name="format-detection" content="telephone=no" />
    <title>TYRO AI - Kurumsal AI Platformu</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
